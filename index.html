<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스(095610) 투자 인사이트 리포트</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; margin: 0; }
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .radar-bg { background: radial-gradient(circle, rgba(59,130,246,0.03) 0%, rgba(255,255,255,0) 70%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { RadarChart, PolarGrid, PolarAngleAxis, Radar, ResponsiveContainer } = window.Recharts;

        const App = () => {
            const currentPrice = 61800;
            const targetPrice = 90000;
            const upsidePercent = (((targetPrice - currentPrice) / currentPrice) * 100).toFixed(1);

            const evaluationData = [
                { subject: '시장매력', A: 8 },
                { subject: '수익성', A: 9 },
                { subject: '기술력', A: 8 },
                { subject: '성장성', A: 9 },
                { subject: '밸류', A: 9.5 },
            ];

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-900 pb-20 animate-in">
                    <main className="max-w-5xl mx-auto px-4 py-12">
                        {/* 헤더 섹션 */}
                        <header className="mb-10">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="px-3 py-1 bg-slate-900 text-white rounded-lg text-[10px] font-black uppercase tracking-widest">KOSDAQ: 095610</span>
                                <span className="text-slate-400 text-sm italic font-medium tracking-tight">2026.04.23 VER 2.5 UPDATE</span>
                            </div>
                            <h1 className="text-6xl md:text-7xl font-black text-slate-900 tracking-tighter mb-4 italic">TESS <span className="text-blue-600 not-italic">테스</span></h1>
                            <p className="text-xl md:text-2xl text-slate-500 font-bold italic leading-tight border-l-4 border-blue-600 pl-6">
                                "실적 턴어라운드를 타고 강하게 뻗어 나갈 전공정의 창"
                            </p>
                        </header>

                        {/* 상단 대시보드 */}
                        <section className="mb-12">
                            <div className="bg-white p-10 md:p-14 rounded-[3.5rem] shadow-2xl shadow-blue-900/10 border border-white relative overflow-hidden">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-12 items-center relative z-10">
                                    <div className="text-center md:text-left">
                                        <p className="text-xs font-black text-blue-600 uppercase tracking-widest mb-3 italic">Target Upside</p>
                                        <div className="flex items-end justify-center md:justify-start gap-1">
                                            <span className="text-8xl font-black text-slate-900 tracking-tighter">+{upsidePercent}</span>
                                            <span className="text-3xl font-black text-blue-600 mb-3">%</span>
                                        </div>
                                    </div>
                                    <div className="md:col-span-2 flex flex-col md:flex-row gap-8 md:gap-16 justify-center md:justify-end items-center">
                                        <div className="text-center md:text-right">
                                            <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Current</p>
                                            <p className="text-4xl font-black text-slate-300 tabular-nums">{currentPrice.toLocaleString()}원</p>
                                        </div>
                                        <div className="text-center md:text-right">
                                            <p className="text-xs font-black text-blue-500 mb-2 uppercase tracking-widest">Target Price</p>
                                            <p className="text-6xl font-black text-blue-600 tracking-tighter tabular-nums">{targetPrice.toLocaleString()}원</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="absolute top-0 right-0 w-96 h-96 bg-blue-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
                            </div>
                        </section>

                        {/* 스코어링 섹션 */}
                        <div className="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm mb-12 flex flex-col md:flex-row items-center gap-12">
                            <div className="w-full md:w-1/2 h-72 radar-bg">
                                <ResponsiveContainer width="100%" height="100%">
                                    <RadarChart data={evaluationData}>
                                        <PolarGrid stroke="#e2e8f0" />
                                        <PolarAngleAxis dataKey="subject" tick={{fontSize: 13, fontWeight: '900', fill: '#64748b'}} />
                                        <Radar name="Tess" dataKey="A" stroke="#2563eb" strokeWidth={3} fill="#3b82f6" fillOpacity={0.2} />
                                    </RadarChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="w-full md:w-1/2">
                                <h3 className="text-2xl font-black text-slate-900 mb-4 italic tracking-tight underline decoration-blue-500 decoration-4 underline-offset-8">INVESTMENT SCORE: 8.8</h3>
                                <p className="text-slate-500 font-medium leading-relaxed">
                                    기술력과 성장성, 그리고 현재의 저평가된 밸류에이션을 종합했을 때, 테스는 2026년 반도체 전공정 섹터 내에서 가장 강력한 주가 탄력성을 보여줄 것으로 기대됩니다.
                                </p>
                            </div>
                        </div>

                        {/* 상세 분석 (Main Thesis) - 새롭게 추가된 부분 */}
                        <section className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 font-black mb-6 italic">01</div>
                                <h4 className="text-lg font-black text-slate-900 mb-4">전공정 정밀 조각가</h4>
                                <p className="text-sm text-slate-500 leading-relaxed font-medium">
                                    식각(Etching)과 증착(Deposition) 분야의 강자로, 특히 독보적인 <b>'건식 세정(Dry Cleaning)'</b> 기술을 통해 삼성전자와 SK하이닉스의 핵심 파트너 지위를 굳건히 하고 있습니다.
                                </p>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 font-black mb-6 italic">02</div>
                                <h4 className="text-lg font-black text-slate-900 mb-4">낸드 부활 & HBM 모멘텀</h4>
                                <p className="text-sm text-slate-500 leading-relaxed font-medium">
                                    낸드 가동률이 80% 이상으로 정상화되며 수주가 폭발하고 있습니다. 여기에 <b>차세대 HBM 하이브리드 본딩</b> 공정 진입은 고부가 가치 장비주로의 리레이팅 트리거입니다.
                                </p>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                <div className="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 font-black mb-6 italic">03</div>
                                <h4 className="text-lg font-black text-slate-900 mb-4">압도적 저평가 메리트</h4>
                                <p className="text-sm text-slate-500 leading-relaxed font-medium">
                                    2026년 역대급 실적이 전망됨에도 불구하고, 동종 업계(PER 25배) 대비 현저히 낮은 <b>PER 15배</b> 수준에 머물고 있어 주가 상승 여력이 매우 충분합니다.
                                </p>
                            </div>
                        </section>

                        {/* 전문가 한줄평 */}
                        <section className="bg-slate-900 rounded-[3.5rem] p-12 md:p-16 text-white shadow-2xl relative overflow-hidden">
                            <div className="relative z-10">
                                <h3 className="text-3xl font-black mb-8 italic text-blue-400">Analyst View</h3>
                                <p className="text-xl md:text-2xl leading-relaxed text-slate-300 font-medium">
                                    "HBM 후공정주들이 고평가 논란에 휩싸일 때, 실적과 밸류에이션 매력을 모두 갖춘 <span className="text-white font-black underline decoration-blue-500 decoration-[6px] underline-offset-[12px]">전공정의 Striker로서 테스를 주목해야 합니다.</span> 3월 한 달간 750억 이상의 수주는 이제 시작에 불과합니다."
                                </p>
                                <div className="mt-12 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center font-black">V2</div>
                                    <div>
                                        <p className="font-bold text-white tracking-tight">여의도 전문가 v2.1</p>
                                        <p className="text-xs text-slate-500 uppercase font-black tracking-widest">Investment Strategy</p>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </main>
                    <footer className="text-center opacity-30 px-4">
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] italic">© 2026 INVEST INSIGHT REPORT | TESS ANALYSIS</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
